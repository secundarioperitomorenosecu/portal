<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portal · Colegio Perito Moreno</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF6F1;
    --surface:#FFFFFF;
    --surface-tint:#FBEEEC;
    --ink:#3A2E2E;
    --ink-dim:#8C7B78;
    --red:#B5433D;
    --red-soft:#D98884;
    --red-pastel:#F3D9D7;
    --sage:#A9BE9A;
    --sage-pastel:#E4EEDE;
    --amber:#D9A85C;
    --amber-pastel:#F5E6CC;
    --sky:#8FB3C7;
    --sky-pastel:#E1EDF2;
    --rule: rgba(58,46,46,0.10);
    --radius: 10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:980px;margin:0 auto;padding:48px 24px 80px;}

  /* Header */
  header{
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:2px solid var(--red-pastel);
    padding-bottom:20px; margin-bottom:8px;
  }
  .brand{display:flex; align-items:center; gap:14px;}
  .brand img{width:44px; height:auto; display:block;}
  .brand-eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--red); margin:0 0 4px;
  }
  h1{
    font-family:'Source Serif 4', serif;
    font-weight:700; font-size:30px; margin:0; letter-spacing:-.01em;
    color:var(--ink);
  }
  .status-line{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px; color:var(--ink-dim); text-align:right;
  }
  .status-line strong{color:var(--red); font-weight:600;}

  /* Login state */
  #login-screen{
    max-width:400px; margin:96px auto; text-align:center;
    background:var(--surface); padding:44px 36px 36px;
    border-radius:16px; border:1px solid var(--rule);
    box-shadow:0 12px 32px rgba(58,46,46,0.06);
    perspective:600px;
  }
  #login-screen img.crest{
    width:110px; height:auto; margin:0 auto 22px; display:block;
    animation: spin-horizontal 6s linear infinite;
    transform-style:preserve-3d;
  }
  @keyframes spin-horizontal{
    from{ transform:rotateY(0deg); }
    to{ transform:rotateY(360deg); }
  }
  @media (prefers-reduced-motion: reduce){
    #login-screen img.crest{ animation:none; }
  }
  #login-screen h2{
    font-family:'Source Serif 4', serif; font-weight:600; font-size:22px; margin:0 0 8px;
    color:var(--ink);
  }
  #login-screen p{color:var(--ink-dim); font-size:14px; margin:0 0 28px; line-height:1.55;}
  .btn{
    font-family:'Inter',sans-serif; font-weight:600; font-size:14px;
    padding:12px 20px; border-radius:8px; border:1px solid var(--red-soft);
    background:transparent; color:var(--ink); cursor:pointer;
    display:inline-flex; align-items:center; gap:10px; justify-content:center;
    transition:background .15s ease, transform .1s ease;
  }
  .btn:hover{background:var(--red-pastel);}
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--red); color:#fff; border-color:var(--red); font-weight:600;}
  .btn-primary:hover{background:#a03a35;}
  #login-error{color:var(--red); font-size:13px; margin-top:16px; min-height:16px;}

  /* Dashboard */
  #dashboard{display:none;}
  .grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
    gap:16px; margin-top:32px;
  }
  .card{
    position:relative;
    background:var(--surface);
    border:1px solid var(--rule);
    border-radius:var(--radius);
    padding:20px 20px 20px;
    padding-top:34px;
    cursor:pointer;
    text-decoration:none; color:inherit;
    display:block;
    transition:border-color .15s ease, transform .12s ease, box-shadow .15s ease;
  }
  .card:hover{border-color:var(--red-soft); transform:translateY(-2px); box-shadow:0 10px 24px rgba(58,46,46,0.08);}
  .card:focus-visible{outline:2px solid var(--red); outline-offset:2px;}
  .card-top{display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:24px;}
  .card-icon{
    width:38px; height:38px; border-radius:50%;
    background:var(--surface-tint); border:1px solid var(--rule);
    display:flex; align-items:center; justify-content:center;
    font-size:17px; color:var(--red);
  }
  .stamp{
    font-family:'IBM Plex Mono', monospace; font-size:9.5px; letter-spacing:.08em; text-transform:uppercase;
    padding:4px 9px; border-radius:20px; white-space:nowrap;
  }
  .stamp.lock{color:#8A5A22; background:var(--amber-pastel);}
  .stamp.open{color:#4C6B3C; background:var(--sage-pastel);}
  .stamp.other{color:#3E6478; background:var(--sky-pastel);}
  .stamp.soon{color:var(--ink-dim); background:#EEE8E2;}
  .card-soon{cursor:default; opacity:.6;}
  .card-soon:hover{border-color:var(--rule); transform:none; box-shadow:none;}
  .drag-handle{
    position:absolute; top:16px; right:16px;
    color:var(--ink-dim); font-size:14px; cursor:grab;
    letter-spacing:-1px;
  }
  .card.dragging{opacity:.4;}
  .card.drag-over{border-color:var(--red); background:var(--surface-tint);}
  .card-name{
    font-family:'Source Serif 4', serif; font-weight:600; font-size:18px; margin:0 0 4px;
    color:var(--ink);
  }
  .card-desc{font-size:12.5px; color:var(--ink-dim); margin:0; line-height:1.45;}

  .card-num{
    position:absolute; top:18px; left:20px;
    font-family:'IBM Plex Mono', monospace; font-size:10px; color:var(--red-soft);
  }

  footer{
    margin-top:52px; padding-top:20px; border-top:1px solid var(--rule);
    display:flex; justify-content:space-between; align-items:center;
  }
  .signout{
    background:none; border:none; color:var(--ink-dim); font-family:'IBM Plex Mono', monospace;
    font-size:11.5px; cursor:pointer; letter-spacing:.05em; text-transform:uppercase;
  }
  .signout:hover{color:var(--red);}
  .foot-note{font-size:11px; color:var(--ink-dim); font-family:'IBM Plex Mono', monospace;}

  @media (prefers-reduced-motion: reduce){
    .card{transition:none;}
  }
</style>
</head>

          <p class="brand-eyebrow">Colegio Perito Moreno</p>

        </div>
      </div>
      <div class="status-line">
        Sesión activa como<br><strong id="user-email">—</strong>
      </div>
    </header>

    <div class="grid" id="apps-grid"></div>

    <footer>
      <span class="foot-note" id="foot-note">6 aplicaciones registradas</span>
      <button class="signout" id="signout">Cerrar sesión ↩</button>
    </footer>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import {
    getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";

  // ---------------------------------------------------------------
  // 1) CONFIGURACIÓN del proyecto Firebase (asistencia-perito)
  // ---------------------------------------------------------------
  const firebaseConfig = {
    apiKey: "AIzaSyCnXlNwV63v4YOR91Y7QAYk8RuGN374zIs",
    authDomain: "asistencia-perito.firebaseapp.com",
    projectId: "asistencia-perito",
    storageBucket: "asistencia-perito.firebasestorage.app",
    messagingSenderId: "856108367645",
    appId: "1:856108367645:web:861dc4ca918f06306e2bf4"
  };

  // URL de tu Cloud Function que emite el token de SSO (ver /functions) — todavía no desplegada
  const MINT_TOKEN_URL = "https://us-central1-asistencia-perito.cloudfunctions.net/mintSsoToken";

  // ---------------------------------------------------------------
  // 2) ACCESO RESTRINGIDO: solo estos emails pueden entrar al portal
  // ---------------------------------------------------------------
  const ALLOWED_EMAILS = [
    "colegioperitomoreno.rl@gmail.com",
    "montesdeocaale@gmail.com",
    "nancymarcelaantunes@gmail.com",
    // agregá acá el resto: "sobrina@gmail.com", "coordinadora@gmail.com", etc.
  ];

  // ---------------------------------------------------------------
  // 3) TUS APLICACIONES
  //    badge: 'lock'  -> requiere usuario y clave sí o sí
  //           'open'  -> sin login / acceso libre
  //           'other' -> PIN, Google u otro método
  //    sso:true solo si comparte el proyecto Firebase de arriba
  //    Y ya desplegaste la Cloud Function (por ahora ninguna la tiene activa)
  // ---------------------------------------------------------------
  const APPS = [
    { name:"Inscripción Nivel Secundario - Directivos", desc:"Inscripciones nivel secundario", url:"https://secundarioperitomorenosecu.github.io/inscripciones-secundaria/", icon:"✎", badge:"open", badgeText:"Acceso libre", sso:false },
    { name:"Formulario de Inscripción Secundaria", desc:"Formulario de inscripción para familias", url:"https://secundarioperitomorenosecu.github.io/inscripciones-secundaria/formulario.html", icon:"✎", badge:"open", badgeText:"Sin login", sso:false },
    { name:"Secundaria Digital", desc:"Asistencia, notas, informes EOE", url:"https://secundarioperitomorenosecu.github.io/peritodigital/", icon:"◆", badge:"lock", badgeText:"Requiere clave", sso:false },
    { name:"Asistencia Secundaria", desc:"Ausencias nivel secundario", url:"https://secundarioperitomorenosecu.github.io/asistencia-perito/", icon:"✓", badge:"lock", badgeText:"Requiere clave", sso:false },
    { name:"Calendario de Eventos", desc:"Eventos interniveles", url:"https://peritoprimaria-stack.github.io/calendario-eventos/", icon:"◷", badge:"other", badgeText:"Con PIN", sso:false },
    { name:"PM Digital Primaria", desc:"Legajo EOE y gestión nivel primario", url:"https://peritoprimaria-stack.github.io/pm-digital-primaria/", icon:"⬡", badge:"other", badgeText:"Con Google", sso:false },
    { name:"Eduausencias", desc:"Ausencias por nivel", url:"https://cens451asistencia-collab.github.io/eduausencias/", icon:"●", badge:"open", badgeText:"Sin login", sso:false },
    { name:"Fichaje Docente", desc:"Panel Directivo — Asistencia Docente", url:"https://precious-beignet-121b5c.netlify.app/panel.html", icon:"⏱", badge:"open", badgeText:"Acceso libre", sso:false },
    { name:"Fichaje Docente - Personal", desc:"Registro de asistencia para docentes", url:"https://precious-beignet-121b5c.netlify.app/index.html", icon:"⏱", badge:"open", badgeText:"Sin login", sso:false },
    { name:"Encuesta Vacunación Padres", desc:"Encuesta Familias (datos en Drive Perito Primaria)", url:"https://script.google.com/macros/s/AKfycbw2GRpRePbYHlpm18dHS-Gf3dFl3Ozv1aD9xXtRELVt_mUKHoVPGt2Ajx9uXtiiil9zNQ/exec", icon:"✚", badge:"open", badgeText:"Sin login", sso:false },
    { name:"Encuesta Vacunación Panel Directivos", desc:"Encuesta Panel Directivos (datos en Drive Perito Primaria)", url:"https://script.google.com/macros/s/AKfycbw2GRpRePbYHlpm18dHS-Gf3dFl3Ozv1aD9xXtRELVt_mUKHoVPGt2Ajx9uXtiiil9zNQ/exec?page=panel", icon:"✚", badge:"open", badgeText:"Sin login", sso:false },
    { name:"Legajos Nivel Inicial", desc:"Legajos de nivel inicial", url:"https://secundarioperitomorenosecu.github.io/legajos-nivel-inicial/", icon:"⬡", badge:"lock", badgeText:"Requiere clave", sso:false },
  ];

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  const loginScreen = document.getElementById('login-screen');
  const dashboard = document.getElementById('dashboard');
  const loginError = document.getElementById('login-error');

  document.getElementById('google-signin').addEventListener('click', async () => {
    loginError.textContent = '';
    try {
      await signInWithPopup(auth, provider);
    } catch (e) {
      loginError.textContent = 'No se pudo iniciar sesión. Probá de nuevo.';
      console.error(e);
    }
  });

  document.getElementById('signout').addEventListener('click', () => signOut(auth));

  onAuthStateChanged(auth, (user) => {
    if (user) {
      if (!ALLOWED_EMAILS.includes(user.email)) {
        loginError.textContent = `El acceso con ${user.email} no está autorizado. Contactá al administrador.`;
        signOut(auth);
        return;
      }
      loginScreen.style.display = 'none';
      dashboard.style.display = 'block';
      document.getElementById('user-email').textContent = user.email || user.displayName || 'usuario';
      renderApps(user);
    } else {
      loginScreen.style.display = 'block';
      dashboard.style.display = 'none';
    }
  });

  const ORDER_KEY = 'portal_app_order_v1';

  function keyOf(appItem){ return appItem.url || appItem.name; }

  function getOrderedApps(){
    let saved;
    try { saved = JSON.parse(localStorage.getItem(ORDER_KEY) || 'null'); } catch(e){ saved = null; }
    if (!saved || !Array.isArray(saved)) return APPS.slice();

    const byKey = new Map(APPS.map(a => [keyOf(a), a]));
    const ordered = [];
    saved.forEach(k => { if (byKey.has(k)) { ordered.push(byKey.get(k)); byKey.delete(k); } });
    // agregar al final cualquier app nueva que no estaba guardada todavía
    byKey.forEach(a => ordered.push(a));
    return ordered;
  }

  function saveOrder(orderedApps){
    try { localStorage.setItem(ORDER_KEY, JSON.stringify(orderedApps.map(keyOf))); } catch(e){}
  }

  function renderApps(user){
    const grid = document.getElementById('apps-grid');
    grid.innerHTML = '';
    document.getElementById('foot-note').textContent = `${APPS.length} aplicaciones registradas · mantené presionada una tarjeta para reordenar`;

    let ordered = getOrderedApps();
    let dragFromIndex = null;

    ordered.forEach((appItem, i) => {
      const card = document.createElement('a');
      card.className = 'card' + (appItem.soon ? ' card-soon' : '');
      card.href = '#';
      card.draggable = true;
      card.dataset.index = i;
      const stamp = appItem.soon
        ? `<span class="stamp soon">Próximamente</span>`
        : `<span class="stamp ${appItem.badge}">${appItem.badgeText}</span>`;
      card.innerHTML = `
        <span class="drag-handle" title="Arrastrar para reordenar">⠿</span>
        <span class="card-num">${String(i+1).padStart(2,'0')}</span>
        <div class="card-top">
          <div class="card-icon">${appItem.icon}</div>
          ${stamp}
        </div>
        <p class="card-name">${appItem.name}</p>
        <p class="card-desc">${appItem.desc}</p>
      `;
      if (!appItem.soon) {
        card.addEventListener('click', async (ev) => {
          ev.preventDefault();
          if (appItem.sso) {
            await openWithSso(appItem, user);
          } else {
            window.open(appItem.url, '_blank');
          }
        });
      } else {
        card.addEventListener('click', (ev) => ev.preventDefault());
      }

      card.addEventListener('dragstart', (ev) => {
        dragFromIndex = i;
        card.classList.add('dragging');
        ev.dataTransfer.effectAllowed = 'move';
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
      });
      card.addEventListener('dragover', (ev) => {
        ev.preventDefault();
        card.classList.add('drag-over');
      });
      card.addEventListener('dragleave', () => {
        card.classList.remove('drag-over');
      });
      card.addEventListener('drop', (ev) => {
        ev.preventDefault();
        card.classList.remove('drag-over');
        const dropIndex = Number(card.dataset.index);
        if (dragFromIndex === null || dragFromIndex === dropIndex) return;
        const moved = ordered.splice(dragFromIndex, 1)[0];
        ordered.splice(dropIndex, 0, moved);
        saveOrder(ordered);
        renderApps(user);
      });

      grid.appendChild(card);
    });
  }

  async function openWithSso(appItem, user){
    try {
      const idToken = await user.getIdToken();
      const res = await fetch(MINT_TOKEN_URL, {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify({ idToken })
      });
      if (!res.ok) throw new Error('mint failed');
      const { customToken } = await res.json();
      const url = new URL(appItem.url);
      url.hash = `sso_token=${encodeURIComponent(customToken)}`;
      window.open(url.toString(), '_blank');
    } catch (e) {
      console.error(e);
      window.open(appItem.url, '_blank');
    }
  }
</script>
